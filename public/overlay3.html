<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Orbitron:400,700,900&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: transparent; font-family: 'Orbitron', sans-serif; overflow: hidden; }

        .wrapper {
            width: 600px; height: 250px;
            display: flex; align-items: flex-end;
            padding-bottom: 20px; padding-left: 20px;
        }

        .player {
            width: 460px; position: relative;
            background: rgba(0,0,0,0.85);
            border: 1px solid;
            border-radius: 4px;
            padding: 12px 16px 10px;
            opacity: 0;
            transition: opacity 0.6s ease;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
        }

        .corner-tag {
            position: absolute; top: -1px; right: 30px;
            font-size: 8px; letter-spacing: 3px;
            padding: 2px 8px;
            font-weight: 700;
        }

        .top-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }

        .cover-wrap {
            width: 52px; height: 52px; flex-shrink: 0;
            position: relative;
        }
        .cover-wrap::before {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 4px;
            animation: borderSpin 3s linear infinite;
        }
        #cover {
            width: 100%; height: 100%;
            object-fit: cover; border-radius: 3px;
            position: relative; z-index: 1;
            animation: spin 12s linear infinite;
            border-radius: 50%;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes borderSpin {
            0% { box-shadow: 0 0 8px 2px var(--clr); }
            50% { box-shadow: 0 0 16px 4px var(--clr); }
            100% { box-shadow: 0 0 8px 2px var(--clr); }
        }

        .text { overflow: hidden; flex: 1; }

        #artist {
            font-size: 9px; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 5px;
            white-space: nowrap; overflow: visible; text-overflow: ellipsis;
            transition: color 0.5s, text-shadow 0.5s;
        }

        #title {
            font-size: 16px; font-weight: 900; color: white;
            text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap; overflow: visible; text-overflow: ellipsis;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .progress-wrap {
            width: 100%; height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; overflow: hidden;
            position: relative;
        }
        #progress-bar {
            height: 100%; width: 0%;
            transition: width 1s linear;
            position: relative;
        }
        #progress-bar::after {
            content: '';
            position: absolute; right: 0; top: -2px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 8px 2px var(--clr);
        }

        .time-row {
            display: flex; justify-content: space-between;
            font-size: 8px; margin-top: 5px;
            color: rgba(255,255,255,0.4); letter-spacing: 2px;
        }

        .scan-line {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 1px;
            background: rgba(255,255,255,0.05);
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="player" id="player">
        <div class="scan-line"></div>
        <span class="corner-tag" id="corner-tag">NOW PLAYING</span>
        <div class="top-row">
            <div class="cover-wrap"><img id="cover" src="" alt=""></div>
            <div class="text">
                <div id="artist">Artista</div>
                <div id="title">Título</div>
            </div>
        </div>
        <div class="progress-wrap"><div id="progress-bar"></div></div>
        <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
        </div>
    </div>
</div>

<script src="/overlay.js"></script>

</body>
</html>
