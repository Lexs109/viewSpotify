<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto:300,400,700,900&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: transparent; font-family: 'Roboto', sans-serif; overflow: hidden; }

        .wrapper {
            width: 220px; height: 320px;
            display: flex; align-items: flex-end;
            padding-bottom: 20px; padding-left: 20px;
        }

        .card {
            width: 180px;
            background: rgba(10,10,10,0.85);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .cover-top {
            width: 100%; height: 180px;
            position: relative; overflow: hidden;
        }

        #cover {
            width: 100%; height: 100%;
            object-fit: cover;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cover-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(transparent, rgba(10,10,10,0.9));
        }

        .now-playing-badge {
            position: absolute; top: 10px; right: 10px;
            font-size: 8px; font-weight: 700; letter-spacing: 2px;
            padding: 3px 8px; border-radius: 20px;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 5px;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #1DB954;
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .info { padding: 12px 14px 14px; overflow: hidden; }

        /* Ventana que recorta el texto */
        .text-wrap {
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 4px;
        }

        #artist {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            white-space: nowrap;
            display: inline-block;
            transition: color 0.5s;
        }

        #title {
            font-size: 15px; font-weight: 900; color: white;
            white-space: nowrap;
            display: inline-block;
        }

        .progress-wrap { width: 100%; height: 3px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        #progress-bar { height: 100%; width: 0%; transition: width 1s linear; border-radius: 3px; }

        .time-row { display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 5px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card" id="player">
        <div class="cover-top">
            <img id="cover" src="" alt="">
            <div class="cover-overlay"></div>
            <div class="now-playing-badge" style="color:white">
                <div class="dot"></div> NOW PLAYING
            </div>
        </div>
        <div class="info">
            <div class="text-wrap"><div id="artist">Artista</div></div>
            <div class="text-wrap"><div id="title">Título</div></div>
            <div class="progress-wrap"><div id="progress-bar"></div></div>
            <div class="time-row">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>
    </div>
</div>

<script src="/overlay.js"></script>
</body>
</html>
